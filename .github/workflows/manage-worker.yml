name: Manage Cloudflare Worker (dump / deploy)

# Two-mode utility for editing the cool-darkness-dce5 Worker without
# the Cloudflare dashboard's flaky Monaco editor.
#
# - dump:   GET the current Worker source from Cloudflare, commit it
#           to the repo as worker_current.js so Claude (or any reviewer)
#           can read it.
# - deploy: take worker_target.js from the repo and PUT it back to
#           Cloudflare via the /content endpoint, preserving secrets
#           and bindings.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'dump (read current source) or deploy (push worker_target.js)'
        required: true
        default: 'dump'
        type: choice
        options:
          - dump
          - deploy
  repository_dispatch:
    types: [manage-worker]

env:
  CF_ACCOUNT_ID: 76598c8a5c8c7abbaed5c4292c363e09
  WORKER_NAME: cool-darkness-dce5
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve mode
        id: mode
        run: |
          M="${{ github.event.inputs.mode || github.event.client_payload.mode || 'dump' }}"
          echo "value=$M" >> "$GITHUB_OUTPUT"
          echo "Running in mode: $M"

      - name: Dump current Worker source
        if: steps.mode.outputs.value == 'dump'
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          # Cloudflare returns a multipart body. The script lives in part[1]
          # after the first \r\n\r\n header break, ending with a trailing
          # boundary marker we strip.
          curl -sS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}" \
            -o /tmp/multipart.raw

          python3 <<'PY'
import re, sys
with open("/tmp/multipart.raw","rb") as f: body = f.read()
# Find the multipart boundary
m = re.search(rb'--([A-Za-z0-9\-]+)\r\n', body)
if not m:
    print("Could not find multipart boundary; raw response saved.", file=sys.stderr)
    sys.exit(1)
boundary = m.group(1)
parts = body.split(b"--" + boundary)
# Find the part that contains the JS module — heuristic: largest part with `export default` or function bodies
best = None
for p in parts:
    if b"\r\n\r\n" not in p: continue
    head, _, payload = p.partition(b"\r\n\r\n")
    if b"export default" in payload or b"async fetch" in payload or len(payload) > 2000:
        if best is None or len(payload) > len(best):
            best = payload
if best is None:
    print("Could not isolate the worker.js payload.", file=sys.stderr)
    sys.exit(1)
# Strip trailing CRLF and any final boundary marker
best = best.rstrip(b"-").rstrip(b"\r\n").rstrip(b"\r\n--")
with open("worker_current.js","wb") as f: f.write(best)
print(f"Wrote worker_current.js ({len(best)} bytes)")
PY

      - name: Deploy worker_target.js
        if: steps.mode.outputs.value == 'deploy'
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          if [ ! -f worker_target.js ]; then
            echo "::error::worker_target.js missing — nothing to deploy"; exit 1
          fi
          # PUT to /content preserves bindings and secrets.
          # Multipart body: metadata blob + the JS module blob.
          BOUNDARY="cowork-$(date +%s)"
          {
            printf -- '--%s\r\n' "$BOUNDARY"
            printf 'Content-Disposition: form-data; name="metadata"; filename="metadata.json"\r\n'
            printf 'Content-Type: application/json\r\n\r\n'
            printf '{"main_module":"worker.js"}'
            printf '\r\n--%s\r\n' "$BOUNDARY"
            printf 'Content-Disposition: form-data; name="worker.js"; filename="worker.js"\r\n'
            printf 'Content-Type: application/javascript+module\r\n\r\n'
            cat worker_target.js
            printf '\r\n--%s--\r\n' "$BOUNDARY"
          } > /tmp/upload.body
          echo "Upload body size: $(wc -c </tmp/upload.body) bytes"
          curl -sS -X PUT \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: multipart/form-data; boundary=$BOUNDARY" \
            --data-binary @/tmp/upload.body \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/content" \
            -o /tmp/deploy.json
          echo "=== Cloudflare response ==="
          cat /tmp/deploy.json
          python3 -c "import json; d=json.load(open('/tmp/deploy.json')); assert d.get('success'), d; print('Deploy successful.')"

      - name: Commit dumped source (dump mode only)
        if: steps.mode.outputs.value == 'dump'
        run: |
          git config user.email "actions-bot@getmemyjob.local"
          git config user.name "Worker manager"
          git add worker_current.js
          if git diff --staged --quiet; then
            echo "No changes to worker_current.js"
          else
            git commit -m "auto: dump Worker source to worker_current.js"
            git push
          fi
