name: Refresh jobs and deploy dashboard

# Run every 6 hours, on manual trigger, or via repository_dispatch (lets the
# probe / other tooling kick a refresh without needing actions:write).
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}
  repository_dispatch:
    types: [refresh-jobs]

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch jobs and generate dashboard
        run: |
          python3 fetch_jobs.py

      - name: Commit updated per-user dashboards and jobs.db
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage jobs.db and every *.html EXCEPT index.html (landing page)
          # and landing.html (canonical landing copy). This keeps the public
          # homepage stable across auto-refresh runs.
          git add jobs.db
          for f in *.html; do
            if [ "$f" != "index.html" ] && [ "$f" != "landing.html" ]; then
              git add "$f"
            fi
          done
          if ! git diff --staged --quiet; then
            git commit -m "auto: refresh dashboard $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          else
            echo "No changes to commit"
          fi
