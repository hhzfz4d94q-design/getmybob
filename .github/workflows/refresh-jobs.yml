name: Refresh jobs and deploy dashboard

# Run every 6 hours and on manual trigger
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch jobs and generate dashboard
        run: |
          python3 fetch_jobs.py

      - name: Commit updated dashboard.html and jobs.db
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html jobs.db
          if ! git diff --staged --quiet; then
            git commit -m "auto: refresh dashboard $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          else
            echo "No changes to commit"
          fi
