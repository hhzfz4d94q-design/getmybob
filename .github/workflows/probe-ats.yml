name: Probe ATS resolution

on:
  workflow_dispatch:
    inputs:
      user_slug:
        description: 'User slug to probe (e.g. geetu, amit-arora)'
        required: true
        default: 'geetu'

env:
  # Silence the Node 20 deprecation warning — GitHub will force Node 24
  # by default starting 2026-06-02. Opting in early keeps logs clean.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write   # so the workflow can commit the report back to the repo

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run probe
        run: python probe_ats.py "${{ github.event.inputs.user_slug }}"

      - name: Upload report (artifact, for ad-hoc downloads)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: probe-report-${{ github.event.inputs.user_slug }}
          path: probe_report.md

      - name: Commit report to reports/ folder
        if: success()
        run: |
          mkdir -p reports
          cp probe_report.md "reports/probe_${{ github.event.inputs.user_slug }}.md"
          git config user.email "actions-bot@getmemyjob.local"
          git config user.name "Probe ATS workflow"
          git add "reports/probe_${{ github.event.inputs.user_slug }}.md"
          if git diff --staged --quiet; then
            echo "Report unchanged; nothing to commit."
          else
            git commit -m "Probe report for ${{ github.event.inputs.user_slug }}"
            git push
          fi
